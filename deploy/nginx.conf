# ─────────────────────────────────────────────────────────────────────────────
# Nginx reverse-proxy config for Bad Debt Early-Warning System
#
# Architecture:
#   Internet ──► Nginx :80  ──► /api/* ──► Next.js :3000 ──► FastAPI :8000
#                              /*       ──► Next.js :3000
#
# Next.js server internally rewrites /api/* → FastAPI (via BACKEND_API_URL).
# Nginx only needs to forward all traffic to Next.js on port 3000.
#
# Install:
#   sudo cp nginx.conf /etc/nginx/sites-available/bad-debt
#   sudo ln -s /etc/nginx/sites-available/bad-debt /etc/nginx/sites-enabled/bad-debt
#   sudo nginx -t && sudo systemctl reload nginx
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;

    # Replace with your domain or IP
    server_name 103.179.56.128 _;

    # Security headers
    add_header X-Content-Type-Options  "nosniff"       always;
    add_header X-Frame-Options         "SAMEORIGIN"    always;
    add_header X-XSS-Protection        "1; mode=block" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # Increase timeouts for long-running compute requests
    proxy_connect_timeout 60s;
    proxy_send_timeout    300s;
    proxy_read_timeout    300s;

    # ── Static assets: served directly with long cache TTL ─────────────────
    location /_next/static/ {
        proxy_pass         http://127.0.0.1:3000/_next/static/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        expires            1y;
        add_header         Cache-Control "public, immutable";
        access_log         off;
    }

    # ── All other traffic → Next.js (handles /api/* proxy internally) ──────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # WebSocket support (Next.js HMR / future use)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
